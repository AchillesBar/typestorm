<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeStorm — How Fast Can You Type?</title>
<meta name="description" content="Type falling words before they crash! A fast-paced typing game with combos, difficulty levels, and high scores. Free to play in your browser.">
<meta property="og:title" content="TypeStorm — How Fast Can You Type?">
<meta property="og:description" content="Words fall from the sky. Type them before they hit the ground. How long can you survive?">
<meta property="og:type" content="website">
<meta name="theme-color" content="#e8614d">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --bg: #080b12;
  --surface: rgba(15, 20, 30, 0.85);
  --border: rgba(60, 70, 90, 0.35);
  --primary: #e8614d;
  --primary-dim: rgba(232, 97, 77, 0.15);
  --primary-glow: rgba(232, 97, 77, 0.4);
  --success: #5de8c1;
  --success-dim: rgba(93, 232, 193, 0.25);
  --combo: #d4a843;
  --danger: #ff3d5a;
  --text: #c8ccd4;
  --text-dim: #3e4555;
  --text-bright: #eef0f4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

/* ─── INPUT ─── */
#input-box {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  pointer-events: all;
}

#input-box input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 400;
  padding: 14px 24px;
  width: 420px;
  max-width: 90vw;
  background: rgba(8, 11, 18, 0.92);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--primary);
  border-radius: 2px;
  color: var(--text-bright);
  text-align: center;
  outline: none;
  letter-spacing: 1px;
  transition: border-color 0.12s, box-shadow 0.12s;
  caret-color: var(--primary);
}

#input-box input::placeholder {
  color: var(--text-dim);
  letter-spacing: 2px;
  font-size: 14px;
  text-transform: uppercase;
}

#input-box input:focus {
  border-color: var(--primary);
  box-shadow: 0 2px 20px var(--primary-glow), inset 0 -1px 0 var(--primary);
}

#input-box input.correct {
  border-color: var(--success);
  border-bottom-color: var(--success);
  box-shadow: 0 2px 16px rgba(93, 232, 193, 0.2);
}

#input-box input.wrong {
  border-color: var(--danger);
  border-bottom-color: var(--danger);
  box-shadow: 0 2px 16px rgba(255, 61, 90, 0.15);
}

/* ─── HUD ─── */
#hud {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 0;
  z-index: 20;
  pointer-events: none;
  font-family: 'JetBrains Mono', monospace;
  background: linear-gradient(180deg, rgba(8,11,18,0.7) 0%, transparent 100%);
  padding: 16px 20px 24px;
}

.hud-item {
  padding: 0 20px;
  text-align: center;
  border-right: 1px solid rgba(60, 70, 90, 0.2);
}

.hud-item:last-child { border-right: none; }

.hud-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.hud-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  margin-top: 2px;
}

.hud-value.combo { color: var(--combo); }
.hud-value.wpm { color: var(--primary); }
.hud-value.score { color: var(--success); }

/* ─── SCREENS ─── */
#menu-screen, #gameover-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: rgba(8, 11, 18, 0.96);
  pointer-events: all;
}

/* ─── TITLE ─── */
#menu-screen h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 14vw, 120px);
  font-weight: 400;
  color: var(--primary);
  letter-spacing: 0.08em;
  line-height: 0.9;
  text-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(232, 97, 77, 0.15);
  margin-bottom: 0;
  position: relative;
}

#menu-screen h1::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: var(--primary);
  margin: 16px auto 0;
  opacity: 0.6;
}

#menu-screen .subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text-dim);
  margin-top: 20px;
  margin-bottom: 48px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ─── BUTTONS ─── */
.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 52px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  margin: 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.12s;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary);
  color: #0a0a0a;
  box-shadow: 0 4px 24px var(--primary-glow);
}

.btn-primary:hover {
  background: #f07060;
  box-shadow: 0 6px 32px rgba(232, 97, 77, 0.5);
}

.btn-secondary {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  color: var(--text);
  border-color: var(--text-dim);
}

/* ─── GAME OVER ─── */
#gameover-screen h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  font-weight: 400;
  color: var(--text-bright);
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  margin: 28px 0 36px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.stat-card {
  background: rgba(8, 11, 18, 0.95);
  padding: 18px 28px;
  text-align: center;
}

.stat-card .label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.stat-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-bright);
  margin-top: 6px;
}

.stat-card .value.mint { color: var(--success); }
.stat-card .value.coral { color: var(--primary); }
.stat-card .value.gold { color: var(--combo); }
.stat-card .value.hot { color: var(--danger); }

/* ─── DIFFICULTY ─── */
#difficulty-select {
  display: flex;
  gap: 0;
  margin-bottom: 32px;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.diff-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 10px 24px;
  border: none;
  border-right: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.12s;
}

.diff-btn:last-child { border-right: none; }
.diff-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.diff-btn.active {
  color: var(--primary);
  background: var(--primary-dim);
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud" style="display:none;">
  <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value score" id="hud-score">0</div></div>
  <div class="hud-item"><div class="hud-label">WPM</div><div class="hud-value wpm" id="hud-wpm">0</div></div>
  <div class="hud-item"><div class="hud-label">Combo</div><div class="hud-value combo" id="hud-combo">0x</div></div>
  <div class="hud-item"><div class="hud-label">Lives</div><div class="hud-value" id="hud-lives">3</div></div>
</div>

<div id="input-box" style="display:none;">
  <input type="text" id="type-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="start typing">
</div>

<div id="menu-screen">
  <h1>TYPESTORM</h1>
  <div class="subtitle">Type the falling words before they crash</div>
  <div id="difficulty-select">
    <button class="diff-btn active" data-diff="easy">EASY</button>
    <button class="diff-btn" data-diff="normal">NORMAL</button>
    <button class="diff-btn" data-diff="hard">HARD</button>
  </div>
  <div id="menu-highscore" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px;margin-bottom:24px;text-transform:uppercase;"></div>
  <button class="btn btn-primary" id="start-btn">START</button>
</div>

<div id="gameover-screen" style="display:none;">
  <h2>GAME OVER</h2>
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Score</div><div class="value mint" id="go-score">0</div></div>
    <div class="stat-card"><div class="label">Best WPM</div><div class="value coral" id="go-wpm">0</div></div>
    <div class="stat-card"><div class="label">Words Typed</div><div class="value gold" id="go-words">0</div></div>
    <div class="stat-card"><div class="label">Max Combo</div><div class="value hot" id="go-combo">0</div></div>
  </div>
  <button class="btn btn-primary" id="retry-btn">AGAIN</button>
  <button class="btn btn-secondary" id="menu-btn">MENU</button>
</div>

<script>
// ─── PALETTE (canvas-side) ───
const C = {
  bg: '#080b12',
  primary: '#e8614d',
  primaryDim: 'rgba(232, 97, 77, 0.12)',
  primaryGlow: 'rgba(232, 97, 77, 0.35)',
  success: '#5de8c1',
  successDim: 'rgba(93, 232, 193, 0.2)',
  combo: '#d4a843',
  danger: '#ff3d5a',
  text: '#c8ccd4',
  textDim: '#3e4555',
  textBright: '#eef0f4',
  surface: 'rgba(12, 16, 24, 0.82)',
  border: 'rgba(50, 60, 80, 0.45)',
  rain: 'rgba(100, 120, 160, 0.08)',
};

// ─── WORD LISTS ───
const WORDS_EASY = [
  "the","and","for","are","but","not","you","all","can","had","her","was","one","our","out",
  "day","get","has","him","his","how","its","may","new","now","old","see","way","who","did",
  "boy","let","put","say","she","too","use","dad","mom","big","end","far","few","got","run",
  "dog","cat","red","sun","top","hot","six","yes","eat","sit","try","ask","car","fly","fun",
  "game","play","type","word","fast","code","fire","rain","star","moon","wave","surf","wind",
  "tree","fish","bird","rock","leaf","snow","sand","lake","hill","road","book","door","hand"
];

const WORDS_NORMAL = [
  "about","after","again","being","could","every","first","found","great","house","large",
  "learn","never","other","place","plant","point","right","small","sound","still","study",
  "their","there","these","think","those","three","under","water","where","which","world",
  "would","write","young","above","along","began","below","build","carry","clean","close",
  "cover","earth","eight","false","focus","group","human","image","index","light","money",
  "north","often","order","paper","power","quick","ready","scene","seven","sharp","since",
  "sleep","space","start","stone","storm","table","today","trade","truth","until","video",
  "watch","woman","extra","react","pixel","debug","admin","query","cache","parse","fetch",
  "async","array","stack","modal","state","props","route","patch","merge","clone","scope"
];

const WORDS_HARD = [
  "absolute","abstract","accurate","actually","advanced","analysis","approach","artifact",
  "balanced","behavior","building","business","callback","campaign","capacity","cautious",
  "champion","chemical","circular","climbing","coherent","collapse","combined","commerce",
  "complete","compound","concrete","conflict","consider","contains","continue","contrast",
  "controls","coverage","creating","criminal","critical","crossing","cultural","currency",
  "database","deadline","december","decision","declared","declined","decrease","defaults",
  "defender","defining","delicate","delivery","designed","detailed","develop","diagonal",
  "dialogue","dinosaur","directly","discover","dispatch","distinct","district","doctrine",
  "document","domestic","dominant","download","drafting","dramatic","duration","dynamics",
  "keyboard","function","variable","template","protocol","iterator","compiler","debugger",
  "encoding","pipeline","frontend","overflow","electron","firewall","graphics","hardware"
];

// ─── GAME STATE ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

const state = {
  phase: 'menu',
  difficulty: 'easy',
  score: 0,
  combo: 0,
  maxCombo: 0,
  lives: 3,
  wordsTyped: 0,
  wordsPerMin: 0,
  bestWpm: 0,
  startTime: 0,
  words: [],
  particles: [],
  spawnTimer: 0,
  spawnInterval: 2000,
  baseSpeed: 0.4,
  typed: '',
  targetWord: null,
  rain: [],
  shakeX: 0, shakeY: 0, shakeDecay: 0,
  popups: [],
  scanY: 0, // horizontal scan line
};

const DIFF = {
  easy:   { speed: 0.35, interval: 2200, lives: 5, list: WORDS_EASY },
  normal: { speed: 0.55, interval: 1600, lives: 3, list: WORDS_NORMAL },
  hard:   { speed: 0.75, interval: 1100, lives: 2, list: WORDS_HARD },
};

// ─── RESIZE ───
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initRain();
}
window.addEventListener('resize', resize);
resize();

// ─── RAIN (replaces stars) ───
function initRain() {
  state.rain = [];
  for (let i = 0; i < 80; i++) {
    state.rain.push({
      x: Math.random() * W,
      y: Math.random() * H,
      len: Math.random() * 18 + 6,
      speed: Math.random() * 1.8 + 0.4,
      alpha: Math.random() * 0.07 + 0.02,
    });
  }
}

// ─── PARTICLES ───
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = Math.random() * 3 + 1.5;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: Math.random() * 0.025 + 0.015,
      r: Math.random() * 2.5 + 1,
      color,
    });
  }
}

// ─── SCREEN SHAKE ───
function shake(intensity = 8) {
  state.shakeDecay = intensity;
}

// ─── SCORE POPUPS ───
function addPopup(x, y, text, color = C.success) {
  state.popups.push({ x, y, text, color, life: 1, vy: -1.5 });
}

// ─── WORD SPAWNING ───
function getWordList() { return DIFF[state.difficulty].list; }

function spawnWord() {
  const list = getWordList();
  const text = list[Math.floor(Math.random() * list.length)];
  if (state.words.find(w => w.text === text)) return;

  const padding = 80;
  const x = padding + Math.random() * (W - padding * 2);

  state.words.push({
    text,
    x,
    y: -20,
    speed: DIFF[state.difficulty].speed * (0.8 + Math.random() * 0.4),
    matched: 0,
    targeted: false,
    alpha: 1,
    scale: 1,
  });
}

// ─── INPUT HANDLING ───
const input = document.getElementById('type-input');

input.addEventListener('input', () => {
  if (state.phase !== 'playing') return;

  const typed = input.value.toLowerCase();

  if (!state.targetWord) {
    for (const w of state.words) {
      if (w.text.startsWith(typed)) {
        state.targetWord = w;
        w.targeted = true;
        break;
      }
    }
  }

  if (state.targetWord) {
    const w = state.targetWord;
    if (w.text.startsWith(typed)) {
      w.matched = typed.length;
      input.className = typed.length > 0 ? 'correct' : '';

      if (typed === w.text) {
        completeWord(w);
        input.value = '';
        input.className = '';
        state.targetWord = null;
      }
    } else {
      input.className = 'wrong';
      w.matched = 0;
      w.targeted = false;
      state.targetWord = null;

      for (const w2 of state.words) {
        if (w2.text.startsWith(typed)) {
          state.targetWord = w2;
          w2.targeted = true;
          w2.matched = typed.length;
          input.className = 'correct';
          break;
        }
      }
    }
  } else if (typed.length > 0) {
    input.className = 'wrong';
  }
});

function completeWord(w) {
  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const comboMultiplier = 1 + Math.floor(state.combo / 5) * 0.5;
  const lengthBonus = w.text.length * 10;
  const points = Math.round(lengthBonus * comboMultiplier);
  state.score += points;
  state.wordsTyped++;

  const elapsed = (Date.now() - state.startTime) / 60000;
  if (elapsed > 0.05) {
    state.wordsPerMin = Math.round(state.wordsTyped / elapsed);
    if (state.wordsPerMin > state.bestWpm) state.bestWpm = state.wordsPerMin;
  }

  // Particles — mint shards
  spawnParticles(w.x, w.y, C.success, 14);
  if (state.combo >= 5) spawnParticles(w.x, w.y, C.combo, 6);

  const popText = state.combo >= 5 ? `+${points} ${state.combo}x` : `+${points}`;
  addPopup(w.x, w.y - 20, popText, state.combo >= 5 ? C.combo : C.success);

  const idx = state.words.indexOf(w);
  if (idx >= 0) state.words.splice(idx, 1);

  if (state.wordsTyped % 10 === 0) {
    state.spawnInterval = Math.max(600, state.spawnInterval - 100);
  }

  updateHUD();
}

function missWord(w) {
  state.lives--;
  state.combo = 0;
  shake(10);
  spawnParticles(w.x, w.y, C.danger, 10);
  addPopup(w.x, w.y - 20, 'MISS', C.danger);

  const idx = state.words.indexOf(w);
  if (idx >= 0) state.words.splice(idx, 1);

  if (state.targetWord === w) {
    state.targetWord = null;
    input.value = '';
    input.className = '';
  }

  updateHUD();

  if (state.lives <= 0) {
    endGame();
  }
}

// ─── HUD ───
function updateHUD() {
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-wpm').textContent = state.wordsPerMin;
  document.getElementById('hud-combo').textContent = state.combo + 'x';
  document.getElementById('hud-lives').textContent = '\u2588'.repeat(Math.max(0, state.lives));
}

// ─── GAME FLOW ───
function startGame() {
  state.phase = 'playing';
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.lives = DIFF[state.difficulty].lives;
  state.wordsTyped = 0;
  state.wordsPerMin = 0;
  state.bestWpm = 0;
  state.startTime = Date.now();
  state.words = [];
  state.particles = [];
  state.popups = [];
  state.spawnTimer = 0;
  state.spawnInterval = DIFF[state.difficulty].interval;
  state.targetWord = null;

  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('input-box').style.display = 'block';

  input.value = '';
  input.className = '';
  input.focus();
  updateHUD();
}

function endGame() {
  state.phase = 'gameover';

  document.getElementById('hud').style.display = 'none';
  document.getElementById('input-box').style.display = 'none';

  const key = 'typestorm-hi-' + state.difficulty;
  const prevHi = parseInt(localStorage.getItem(key) || '0');
  const isNewHi = state.score > prevHi;
  if (isNewHi) localStorage.setItem(key, state.score);

  document.getElementById('go-score').textContent = state.score;
  document.getElementById('go-wpm').textContent = state.bestWpm;
  document.getElementById('go-words').textContent = state.wordsTyped;
  document.getElementById('go-combo').textContent = state.maxCombo + 'x';

  let badge = document.getElementById('hi-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'hi-badge';
    badge.style.cssText = `
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    `;
    document.querySelector('#gameover-screen h2').after(badge);
  }
  badge.textContent = isNewHi ? 'NEW HIGH SCORE' : `BEST: ${prevHi}`;
  badge.style.color = isNewHi ? C.combo : C.textDim;

  document.getElementById('gameover-screen').style.display = 'flex';
}

// ─── BUTTONS ───
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  state.phase = 'menu';
  updateMenuHi();
});

function updateMenuHi() {
  const hi = parseInt(localStorage.getItem('typestorm-hi-' + state.difficulty) || '0');
  const el = document.getElementById('menu-highscore');
  el.textContent = hi > 0 ? `Best: ${hi}` : '';
}

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = btn.dataset.diff;
    updateMenuHi();
  });
});

// Show high score on load
updateMenuHi();

// ─── RENDER LOOP ───
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  // Shake
  if (state.shakeDecay > 0.5) {
    state.shakeX = (Math.random() - 0.5) * state.shakeDecay;
    state.shakeY = (Math.random() - 0.5) * state.shakeDecay;
    state.shakeDecay *= 0.85;
  } else {
    state.shakeX = 0; state.shakeY = 0; state.shakeDecay = 0;
  }
  ctx.save();
  ctx.translate(state.shakeX, state.shakeY);

  // Clear
  ctx.fillStyle = C.bg;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Rain streaks
  for (const r of state.rain) {
    r.y += r.speed * dt * 0.08;
    if (r.y > H + r.len) { r.y = -r.len; r.x = Math.random() * W; }
    ctx.globalAlpha = r.alpha;
    ctx.strokeStyle = '#6880a8';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x, r.y + r.len);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Horizontal scan line (subtle)
  state.scanY = (state.scanY + dt * 0.03) % H;
  ctx.fillStyle = 'rgba(232, 97, 77, 0.015)';
  ctx.fillRect(0, state.scanY - 1, W, 2);

  if (state.phase === 'playing') {
    // Spawn words
    state.spawnTimer += dt;
    if (state.spawnTimer >= state.spawnInterval) {
      state.spawnTimer = 0;
      spawnWord();
    }

    // Update words
    for (let i = state.words.length - 1; i >= 0; i--) {
      const w = state.words[i];
      w.y += w.speed * dt * 0.06;

      if (w.y > H - 80) {
        missWord(w);
        continue;
      }

      drawWord(w);
    }

    // Ground line — pulsing coral
    const pulse = 0.3 + Math.sin(time * 0.003) * 0.1;
    ctx.strokeStyle = `rgba(232, 97, 77, ${pulse})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 80);
    ctx.lineTo(W, H - 80);
    ctx.stroke();

    // Faint glow beneath ground line
    const grd = ctx.createLinearGradient(0, H - 80, 0, H - 40);
    grd.addColorStop(0, `rgba(232, 97, 77, ${pulse * 0.15})`);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(0, H - 80, W, 40);
  }

  // Particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life -= p.decay;

    if (p.life <= 0) {
      state.particles.splice(i, 1);
      continue;
    }

    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    // Square particles instead of circles — sharper aesthetic
    const s = p.r * p.life;
    ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
  }
  ctx.globalAlpha = 1;

  // Score popups
  for (let i = state.popups.length - 1; i >= 0; i--) {
    const p = state.popups[i];
    p.y += p.vy;
    p.life -= 0.015;
    if (p.life <= 0) { state.popups.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.font = '700 14px "JetBrains Mono", monospace';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.textAlign = 'start';
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

function drawWord(w) {
  ctx.font = '700 20px "JetBrains Mono", monospace';

  const text = w.text;
  const totalWidth = ctx.measureText(text).width;
  const x = w.x - totalWidth / 2;
  const y = w.y;

  // Background — sharp rectangle, not pill
  const pad = 10;
  const boxW = totalWidth + pad * 2;
  const boxH = 32;
  const boxX = x - pad;
  const boxY = y - 22;

  // Glow for targeted word
  if (w.targeted) {
    ctx.shadowColor = C.primary;
    ctx.shadowBlur = 12;
  }

  ctx.fillStyle = w.targeted ? C.primaryDim : C.surface;
  ctx.strokeStyle = w.targeted ? C.primary : C.border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.rect(boxX, boxY, boxW, boxH);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Progress fill
  if (w.matched > 0) {
    const progress = w.matched / text.length;
    ctx.fillStyle = C.successDim;
    ctx.fillRect(boxX, boxY, boxW * progress, boxH);
  }

  // Characters
  let cx = x;
  for (let i = 0; i < text.length; i++) {
    if (i < w.matched) {
      ctx.fillStyle = C.success;
    } else if (w.targeted) {
      ctx.fillStyle = C.textBright;
    } else {
      ctx.fillStyle = C.textDim;
    }
    ctx.fillText(text[i], cx, y);
    cx += ctx.measureText(text[i]).width;
  }
}

// ─── KEYBOARD FOCUS ───
document.addEventListener('keydown', (e) => {
  if (state.phase === 'playing') {
    input.focus();
  }
  if (state.phase === 'menu' && (e.key === 'Enter' || e.key === ' ')) {
    startGame();
  }
  if (state.phase === 'gameover' && (e.key === 'Enter' || e.key === ' ')) {
    startGame();
  }
});

// Start loop
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
